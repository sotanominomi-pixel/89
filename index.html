<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="content-area"></div>
        <nav class="tab-bar">
            <button class="tab-item active" id="nav-clock"><span class="icon">🕒</span><span class="label">時計</span></button>
            <button class="tab-item" id="nav-stopwatch"><span class="icon">⏱️</span><span class="label">ストップウォッチ</span></button>
            <button class="tab-item" id="nav-alarm"><span class="icon">⏰</span><span class="label">アラーム</span></button>
            <button class="tab-item" id="nav-settings"><span class="icon">⚙️</span><span class="label">設定</span></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
